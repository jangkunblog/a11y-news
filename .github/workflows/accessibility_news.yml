name: Collect Accessibility News

on:
  # 정기 실행: 매주 월요일 오전 9시 (KST = UTC 0시)
  schedule:
    - cron: '0 0 * * 1'  # UTC 기준 일요일 자정 = KST 월요일 오전 9시
  
  # 수동 실행: 키워드와 프롬프트 커스터마이징 가능
  workflow_dispatch:
    inputs:
      keywords:
        description: '검색할 키워드 (쉼표로 구분)'
        required: false
        default: ''
        type: string
      custom_prompt:
        description: 'Gemini에 전달할 추가 지시사항'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-news:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul  # 한국 시간 사용 (PR/브랜치/파일명 일치)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check for existing news file
        id: check_file
        run: |
          TODAY=$(date +%Y-%m-%d)
          FILE_PATH="src/content/blog/a11y-news-${TODAY}.md"
          if [ -f "$FILE_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          fi
      
      - name: Collect accessibility news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 뉴스 수집 시작..."
          
          # 키워드 처리 (쉼표를 공백으로 변환)
          KEYWORDS="${{ github.event.inputs.keywords }}"
          CUSTOM_PROMPT="${{ github.event.inputs.custom_prompt }}"
          
          # Python 명령어 구성
          CMD="python scripts/collect_news.py"
          
          if [ -n "$KEYWORDS" ]; then
            echo "🎯 커스텀 키워드: $KEYWORDS"
            # 쉼표를 공백으로 변환하고 각 키워드를 개별 인자로 전달
            KEYWORDS_CLEANED=$(echo "$KEYWORDS" | sed 's/,/ /g' | xargs)
            CMD="$CMD --keywords $KEYWORDS_CLEANED"
          fi
          
          if [ -n "$CUSTOM_PROMPT" ]; then
            echo "📝 커스텀 프롬프트 적용: $CUSTOM_PROMPT"
            CMD="$CMD --custom-prompt \"$CUSTOM_PROMPT\""
          fi
          
          echo "실행 명령어: $CMD"
          eval $CMD
      
      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain src/content/blog/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 새로운 게시물이 생성되었습니다."
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  변경사항이 없습니다."
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # 현재 날짜와 시간 (KST - job env TZ 적용)
          TODAY=$(date +%Y-%m-%d)
          TIME=$(date +%H%M%S)
          
          # 브랜치 이름 생성 (시간 포함)
          BRANCH_NAME="news/${TODAY}-${TIME}"
          
          # Git 설정
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 생성된 파일을 임시 저장
          mkdir -p /tmp/news-backup
          cp -r src/content/blog/a11y-news-*.md /tmp/news-backup/ 2>/dev/null || true
          
          # 최신 main 브랜치 가져오기
          git fetch origin main
          git reset --hard origin/main
          
          # 임시 저장한 파일 복원
          cp -r /tmp/news-backup/* src/content/blog/ 2>/dev/null || true
          
          # 새 브랜치 생성 및 체크아웃
          git checkout -b ${BRANCH_NAME}
          
          # 커스텀 키워드 정보 추가
          KEYWORDS_INFO=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            KEYWORDS_INFO=" (키워드: ${{ github.event.inputs.keywords }})"
          fi
          
          # 변경된 파일 추가
          git add src/content/blog/
          
          # 커밋
          git commit -m "Add accessibility news for ${TODAY} ${TIME}${KEYWORDS_INFO}

          Automatically collected and generated by GitHub Actions.
          
          - 수집 일시: $(date '+%Y-%m-%d %H:%M:%S KST')
          - 수집 방식: ${{ github.event_name }}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # 브랜치 푸시 (upstream 설정)
          git push -u origin ${BRANCH_NAME}
          
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "datetime=${TODAY} ${TIME}" >> $GITHUB_OUTPUT
          echo ""
          echo "✅ 브랜치가 생성되고 푸시되었습니다!"
          echo "📄 파일: ${{ steps.check_file.outputs.file_path }}"
        id: commit_changes
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M:%S)
          BRANCH_NAME="${{ steps.commit_changes.outputs.branch_name }}"
          DATETIME="${{ steps.commit_changes.outputs.datetime }}"
          
          # 키워드 정보
          KEYWORDS_INFO=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            KEYWORDS_INFO="
            
            🎯 **검색 키워드**: ${{ github.event.inputs.keywords }}"
          fi
          
          # 커스텀 프롬프트 정보
          PROMPT_INFO=""
          if [ -n "${{ github.event.inputs.custom_prompt }}" ]; then
            PROMPT_INFO="
            
            📝 **커스텀 프롬프트**: ${{ github.event.inputs.custom_prompt }}"
          fi
          
          # PR 생성
          gh pr create \
            --title "📰 디지털 접근성 뉴스 - ${TODAY} ${TIME}" \
            --body "## 🤖 자동 생성된 뉴스 게시물
            
            매주 자동으로 수집된 디지털 접근성 관련 뉴스입니다.
            
            ### 📋 세부 정보
            - 📅 **수집 일시**: ${TODAY} ${TIME} (KST)
            - 🔧 **실행 방식**: ${{ github.event_name }}
            - 📄 **파일**: \`${{ steps.check_file.outputs.file_path }}\`${KEYWORDS_INFO}${PROMPT_INFO}
            
            ### ✅ 검토 사항
            - [ ] 뉴스 내용이 정확하고 적절한가?
            - [ ] 출처 링크가 모두 포함되어 있는가?
            - [ ] 요약과 결론이 명확한가?
            - [ ] 오타나 문법 오류가 없는가?
            
            ### 🚀 다음 단계
            1. 게시물 내용을 검토하세요
            2. 필요시 직접 수정하세요 (브랜치: \`${BRANCH_NAME}\`)
            3. 문제없으면 **Merge**하여 블로그에 발행하세요
            
            ---
            
            💡 Merge 시 자동으로 Vercel에 배포됩니다." \
            --base main \
            --head ${BRANCH_NAME}
          
          echo ""
          echo "✅ Pull Request가 생성되었습니다!"
      
      - name: Summary
        if: always()
        run: |
          echo "## 🌐 디지털 접근성 뉴스 수집 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **상태**: Pull Request 생성 완료" >> $GITHUB_STEP_SUMMARY
            echo "📄 **파일**: \`${{ steps.check_file.outputs.file_path }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔍 **다음 단계**: [Pull Requests 탭](https://github.com/${{ github.repository }}/pulls)에서 검토 후 Merge하세요" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **상태**: 변경사항 없음" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 **실행 일시**: $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "🔧 **실행 방식**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            echo "🎯 **커스텀 키워드**: ${{ github.event.inputs.keywords }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -n "${{ github.event.inputs.custom_prompt }}" ]; then
            echo "📝 **커스텀 프롬프트**: ${{ github.event.inputs.custom_prompt }}" >> $GITHUB_STEP_SUMMARY
          fi
