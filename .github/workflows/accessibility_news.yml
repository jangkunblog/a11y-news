name: Collect Accessibility News

on:
  # 정기 실행: 매주 월요일 오전 9시 (KST = UTC 0시)
  schedule:
    - cron: '0 0 * * 1'  # UTC 기준 일요일 자정 = KST 월요일 오전 9시
  
  # 수동 실행: 키워드와 프롬프트 커스터마이징 가능
  workflow_dispatch:
    inputs:
      keywords:
        description: '검색할 키워드 (쉼표로 구분)'
        required: false
        default: ''
        type: string
      custom_prompt:
        description: 'Gemini에 전달할 추가 지시사항'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  collect-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check for existing news file
        id: check_file
        run: |
          TODAY=$(date +%Y-%m-%d)
          FILE_PATH="src/content/blog/a11y-news-${TODAY}.md"
          if [ -f "$FILE_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          fi
      
      - name: Collect accessibility news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 키워드 파라미터 준비
          KEYWORDS_ARG=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            # 쉼표로 구분된 키워드를 공백으로 변환
            KEYWORDS=$(echo "${{ github.event.inputs.keywords }}" | sed 's/,/ /g')
            KEYWORDS_ARG="--keywords $KEYWORDS"
          fi
          
          # 커스텀 프롬프트 파라미터 준비
          PROMPT_ARG=""
          if [ -n "${{ github.event.inputs.custom_prompt }}" ]; then
            PROMPT_ARG="--custom-prompt \"${{ github.event.inputs.custom_prompt }}\""
          fi
          
          # 스크립트 실행
          echo "🚀 뉴스 수집 시작..."
          if [ -n "$KEYWORDS_ARG" ]; then
            echo "🎯 커스텀 키워드: ${{ github.event.inputs.keywords }}"
          fi
          if [ -n "$PROMPT_ARG" ]; then
            echo "📝 커스텀 프롬프트 적용"
          fi
          
          python scripts/collect_news.py $KEYWORDS_ARG $PROMPT_ARG
      
      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain src/content/blog/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 새로운 게시물이 생성되었습니다."
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  변경사항이 없습니다."
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 현재 날짜
          TODAY=$(date +%Y-%m-%d)
          
          # 커스텀 키워드 정보 추가
          KEYWORDS_INFO=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            KEYWORDS_INFO=" (키워드: ${{ github.event.inputs.keywords }})"
          fi
          
          # 변경된 파일 추가
          git add src/content/blog/
          
          # 커밋
          git commit -m "Add accessibility news for ${TODAY}${KEYWORDS_INFO}

          Automatically collected and generated by GitHub Actions.
          
          - 수집 일시: $(date '+%Y-%m-%d %H:%M:%S UTC')
          - 수집 방식: ${{ github.event_name }}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # 푸시
          git push
          
          echo ""
          echo "✅ 변경사항이 커밋되고 푸시되었습니다!"
          echo "📄 파일: ${{ steps.check_file.outputs.file_path }}"
      
      - name: Summary
        if: always()
        run: |
          echo "## 🌐 디지털 접근성 뉴스 수집 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **상태**: 새 게시물 생성 및 커밋 완료" >> $GITHUB_STEP_SUMMARY
            echo "📄 **파일**: \`${{ steps.check_file.outputs.file_path }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **상태**: 변경사항 없음" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 **실행 일시**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "🔧 **실행 방식**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            echo "🎯 **커스텀 키워드**: ${{ github.event.inputs.keywords }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -n "${{ github.event.inputs.custom_prompt }}" ]; then
            echo "📝 **커스텀 프롬프트**: ${{ github.event.inputs.custom_prompt }}" >> $GITHUB_STEP_SUMMARY
          fi
